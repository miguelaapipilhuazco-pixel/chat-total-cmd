name: Compilar APK de IA
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar codigo fuente
        uses: actions/checkout@v3

      - name: Configurar Java 17 en la nube
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v2

      - name: Instalar dependencias de Node.js
        run: |
          npm install
          npm install -g @capacitor/cli
          npx cap init "Control de IA" "com.miguel.iacontrol" --web-dir=. --confirm
          npm install @capacitor/android
          npx cap add android

      - name: Forzar Manifiesto Nativo
        run: |
          mkdir -p android/app/src/main
          cat << 'INNER_EOF' > android/app/src/main/AndroidManifest.xml
          <manifest xmlns:android="http://android.com" package="com.miguel.iacontrol">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
              <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <application android:label="Control de IA" android:allowBackup="true" android:icon="@mipmap/ic_launcher">
                  <activity android:name="com.getcapacitor.BridgeActivity" android:exported="true" android:theme="@style/AppTheme.NoActionBar">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          INNER_EOF

      - name: Inyectar codigo puente en Gradle
        run: |
          npx cap sync

      - name: Compilar instalador ejecutable APK
        run: |
          cd android && chmod +x gradlew
          ./gradlew assembleDebug

      - name: Subir instalador terminado
        uses: actions/upload-artifact@v3
        with:
          name: IA-Controlador-Instalable
          path: android/app/build/outputs/apk/debug/app-debug.apk
