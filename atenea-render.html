<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>${config.nombreIA} - OS Engine</title><script type="module" src="https://jsdelivr.net"></script><link rel="stylesheet" href="https://jsdelivr.net"/><script src="https://tailwindcss.com"></script></head><body class="bg-black text-white flex items-center justify-center h-screen m-0"><ion-app class="bg-transparent flex items-center justify-center"><ion-card class="p-6 ${modoVisual} text-center max-w-sm border transition-all duration-300"><ion-card-header><ion-card-title class="text-amber-500 font-bold text-lg flex items-center justify-center gap-2">⚛️ ${config.nombreIA} Multi-OS (${estiloOS})</ion-card-title></ion-card-header><ion-card-content class="text-zinc-300 text-sm mb-4">Componente amoldado al sistema de forma nativa:<br><b class="text-white block mt-2 text-base capital-case">${elemento}</b></ion-card-content><div class="grid grid-cols-2 gap-2 mb-4 text-xs"><div class="p-2 bg-black/40 rounded-lg border border-zinc-800">⠃ Braille</div><div class="p-2 bg-black/40 rounded-lg border border-zinc-800">🖐️ Señas Int.</div><div class="p-2 bg-black/40 rounded-lg border border-zinc-800">🎙️ Voz</div><div class="p-2 bg-black/40 rounded-lg border border-zinc-800">⌨️ Texto</div></div><ion-button onclick="window.close()" expand="block" color="warning" class="font-bold">❌ Destruir Vista</ion-button></ion-card></ion-app></body></html>
